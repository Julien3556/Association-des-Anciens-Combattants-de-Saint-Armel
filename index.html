<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="stylesheet" href="./style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Association des Anciens Combattants</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Description affichée dans les résultats Google -->
<meta name="description" content="Association des Anciens Combattants de Saint-Armel – Cérémonies commémoratives, mémoire et fraternité. Section C.P.G. C.A.T.M. T.O.E.">

<!-- Réseaux sociaux (Open Graph) -->
<meta property="og:title" content="Association des Anciens Combattants de Saint-Armel">
<meta property="og:description" content="Nous faisons vivre le souvenir des combattants de la France.">
<meta property="og:image" content="https://github.com/Julien3556/Association-des-Anciens-Combattants-de-Saint-Armel/images/logo.jpg">
<meta property="og:type" content="website">

<!-- Langue -->
<meta property="og:locale" content="fr_FR">
</head>
<body>

<!-- ══════════════ NAVIGATION ══════════════ -->
<nav>
  <div class="nav-logo">
    <img src="images/logo.png" alt="Logo" width="40" height="40" style="object-fit: contain;">
    <span id="nav-nom">Association des Anciens Combattants</span>
  </div>
  <ul class="nav-links">
    <li><a href="#infos">Infos</a></li>
    <li><a href="#galerie">Galerie</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- ══════════════ HERO ══════════════ -->
<section class="hero">
  <div class="hero-tag" id="hero-tag"></div>
  <h1 id="hero-titre"></h1>
  <p class="hero-sub" id="hero-texte"></p>
  <p class="hero-devise" id="hero-devise"></p>
  <div class="hero-scroll" onclick="document.getElementById('infos').scrollIntoView({behavior:'smooth'})">
    <div class="scroll-line"></div>
    Défiler
  </div>
</section>

<!-- ══════════════ BANDEAU D'INFORMATION ══════════════ -->
<div id="infos" class="info-banner">
  <!-- Rempli par JS depuis data.json -->
</div>

<!-- ══════════════ GALERIE ══════════════ -->
<section id="galerie" class="gallery-section">
  <div class="section-header">
    <h2 class="section-title">Notre <em>galerie</em></h2>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterGallery(this,'tous')">Tous</button>
      <button class="filter-btn" onclick="filterGallery(this,'ceremonies')">Cérémonies</button>
      <button class="filter-btn" onclick="filterGallery(this,'portraits')">Portraits</button>
      <button class="filter-btn" onclick="filterGallery(this,'archives')">Archives</button>
      <button class="filter-btn" onclick="filterGallery(this,'vie')">Vie associative</button>
    </div>
  </div>
  <div class="gallery-grid" id="galleryGrid">
    <!-- Rempli par JS depuis data.json -->
  </div>
</section>

<!-- ══════════════ LIGHTBOX ══════════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div id="lbContent" style="width:60vw;height:50vh;border-radius:8px;background:var(--warm);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;">
      Photos
    </div>
  </div>
  <button class="lb-nav-btn lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav-btn lb-next" onclick="lbNav(+1)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<!-- ══════════════ COORDONNÉES ══════════════ -->
<section id="contact" class="contact-section">
  <div class="contact-inner">
    <h2 class="contact-heading">Nous <em>contacter</em></h2>
    <div class="contact-cards" id="contact-cards">
      <!-- Rempli par JS depuis data.json -->
    </div>
  </div>
</section>

<!-- ══════════════ FOOTER ══════════════ -->
<footer id="footer"></footer>

<script>
/* ════════════════════════════════════════
   Chargement des données depuis data.json
   ════════════════════════════════════════ */
let photosData = [];

fetch('data.json')
  .then(r => r.json())
  .then(data => {

    /* ── Association / Hero ── */
    const a = data.association;
    document.getElementById('page-title').textContent = a.nom;
    document.getElementById('nav-nom').textContent = a.nom;
    document.getElementById('hero-tag').textContent = a.nom_complet;
    document.getElementById('hero-titre').innerHTML = a.hero_titre;
    document.getElementById('hero-texte').textContent = a.hero_texte;
    document.getElementById('hero-devise').innerHTML = '&laquo;&nbsp;' + a.devise + '&nbsp;&raquo;';

    /* ── Bandeau d'infos ── */
    const banner = document.getElementById('infos');
    banner.innerHTML = data.infos.map((info, i) => `
      ${i > 0 ? '<div class="info-sep"></div>' : ''}
      <div class="info-item">
        <div class="info-label">${info.label}</div>
        <div class="info-value">${info.titre}</div>
        <div class="info-desc">${info.description}</div>
      </div>
    `).join('');

    /* ── Galerie ── */
    photosData = data.photos;
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = data.photos.map((photo, i) => `
      <div class="photo-card" data-cat="${photo.categorie}" onclick="openLightbox(${i})">
        <img class="photo-img" src="${photo.src}" alt="${photo.legende}">
        <div class="photo-placeholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>${capitalise(photo.categorie)}</span>
        </div>
        <div class="photo-overlay"><span class="photo-caption">${photo.legende}</span></div>
      </div>
    `).join('');

    /* ── Contact ── */
    const c = data.contact;
    document.getElementById('contact-cards').innerHTML = `
      <div class="contact-card">
        <div class="contact-card-icon">📍</div>
        <div class="contact-card-label">Adresse</div>
        <div class="contact-card-value">${c.adresse}</div>
      </div>
      <div class="contact-card">
        <div class="contact-card-icon">📞</div>
        <div class="contact-card-label">Téléphone</div>
        <div class="contact-card-value">
          <a href="tel:${c.telephone_href}">${c.telephone}</a>
        </div>
      </div>
      <div class="contact-card">
        <div class="contact-card-icon">✉️</div>
        <div class="contact-card-label">Email</div>
        <div class="contact-card-value">
          <a href="mailto:${c.email}">${c.email}</a>
        </div>
      </div>
    `;

    /* ── Footer ── */
    document.getElementById('footer').innerHTML = data.footer;

  })
  .catch(err => console.error('Erreur chargement data.json :', err));


/* ════════════════════════════════════════
   Filtre galerie
   ════════════════════════════════════════ */
function filterGallery(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-card').forEach(card => {
    card.style.display = (cat === 'tous' || card.dataset.cat === cat) ? '' : 'none';
  });
}

/* ════════════════════════════════════════
   Lightbox
   ════════════════════════════════════════ */
let lbCurrent = 0;

function openLightbox(idx) {
  lbCurrent = idx;
  document.getElementById('lightbox').classList.add('open');
  updateLb();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function closeLightboxOnBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}
function lbNav(dir) {
  lbCurrent = (lbCurrent + dir + photosData.length) % photosData.length;
  updateLb();
}
function updateLb() {
  document.getElementById('lbCounter').textContent =
    `${lbCurrent + 1} / ${photosData.length} — ${photosData[lbCurrent].legende}`;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(+1);
});

/* ════════════════════════════════════════
   Utilitaire
   ════════════════════════════════════════ */
function capitalise(str) {
  const labels = {
    ceremonies: 'Cérémonie',
    portraits:  'Portrait',
    archives:   'Archives',
    vie:        'Vie asso.'
  };
  return labels[str] || str;
}
</script>

</body>
</html>
